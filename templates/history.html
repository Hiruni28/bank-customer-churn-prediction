<!DOCTYPE html>
<html>

<head>

<title>Prediction History</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4">

Prediction History

</h2>

<a href="/" class="btn btn-primary mb-3">

Dashboard

</a>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Date</th>

<th>Probability</th>

<th>Risk</th>

<th>Prediction</th>

</tr>

</thead>

<tbody>

{% for row in rows %}

<tr>

<td>{{ row[0] }}</td>

<td>{{ row[6] }}</td>

<td>{{ row[3] }}%</td>

<td>{{ row[5] }}</td>

<td>{{ row[4] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
