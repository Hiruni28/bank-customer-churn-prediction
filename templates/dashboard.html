<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">

</head>

<body>

<div class="container py-5">

    <div class="dashboard-card">

        <div class="top-bar">

            <div class="profile">

                <img src="{{ user.picture }}" class="avatar">

                <div>

                    <h3>{{ user.name }}</h3>

                    <p>{{ user.email }}</p>

                </div>

            </div>

            <a href="/logout" class="btn btn-danger">
                Logout
            </a>

        </div>

        <hr>

        <h1>🏦 Bank Customer Churn Prediction System</h1>

        <p>
            Welcome to the Machine Learning Dashboard.
        </p>

        <div class="row mt-5">

            <div class="col-md-3">

                <div class="info-card">

                    <h4>Model</h4>

                    <h2>LightGBM</h2>

                </div>

            </div>

            <div class="col-md-3">

                <div class="info-card">

                    <h4>Accuracy</h4>

                    <h2>97%</h2>

                </div>

            </div>

            <div class="col-md-3">

                <div class="info-card">

                    <h4>Algorithm</h4>

                    <h2>Classification</h2>

                </div>

            </div>

            <div class="col-md-3">

                <div class="info-card">

                    <h4>Status</h4>

                    <h2>Active</h2>

                </div>

            </div>

        </div>

        <div class="text-center mt-5">

            <a href="/prediction" class="btn btn-primary btn-lg">

                Start Prediction

            </a>

        </div>

    </div>

</div>

</body>

</html>
