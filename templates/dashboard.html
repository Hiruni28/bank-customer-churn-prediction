<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

    {% include 'navbar.html' %}

    <div class="card profile-bar mb-4">

        <div class="card-body d-flex align-items-center">

            <img src="{{ user.picture }}"
                width="70"
                height="70"
                class="rounded-circle">

            <div class="ms-3">

                <h4 class="mb-1">
                    {{ user.name }}
                </h4>

                <p class="text-muted mb-0">
                    {{ user.email }}
                </p>

            </div>

        </div>

    </div>

    <div class="container py-5">

        <div class="dashboard-card">

            <h1>🏦 Bank Customer Churn Prediction System</h1>

            <p>
                Welcome to the Dashboard
            </p>

            <div class="row mt-5">

                <div class="col-md-3">
                    <div class="info-card">
                        <h5>Total Predictions</h5>
                        <h1>{{ total }}</h1>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="info-card risk-high">
                        <h5>High Risk</h5>
                        <h1>{{ high }}</h1>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="info-card risk-medium">
                        <h5>Medium Risk</h5>
                        <h1>{{ medium }}</h1>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="info-card risk-low">
                        <h5>Low Risk</h5>
                        <h1>{{ low }}</h1>
                    </div>
                </div>

            </div>

            <div class="row mt-5">

                <div class="col-md-8 mx-auto">
                    <canvas id="riskChart"></canvas>
                </div>

            </div>

            <div class="text-center mt-5">

                <a href="/prediction" class="btn btn-primary btn-lg">
                    Start Prediction
                </a>

                <a href="/history" class="btn btn-success btn-lg ms-3">
                    Prediction History
                </a>

                <a href="/reports" class="btn btn-info btn-lg ms-3">
                    Reports
                </a>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>

        const ctx = document.getElementById("riskChart");

        new Chart(ctx, {
            type: "pie",
            data: {
                labels: ["High", "Medium", "Low"],
                datasets: [{
                    data: [
                        {{ high }},
                        {{ medium }},
                        {{ low }}
                    ],
                    backgroundColor: [
                        "#e6555b",
                        "#d4a73a",
                        "#49c6b8"
                    ],
                    borderColor: "#111826",
                    borderWidth: 2
                }]
            },
            options: {
                plugins: {
                    legend: {
                        labels: {
                            color: "#eae7df",
                            font: { family: "'IBM Plex Mono', monospace", size: 12 }
                        }
                    }
                }
            }
        });

    </script>

</body>

</html>
