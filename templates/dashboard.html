<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

    {% include 'navbar.html' %}
    <div class="card shadow mb-4">

<div class="card-body d-flex align-items-center">

<img src="{{ user.picture }}"
width="70"
height="70"
class="rounded-circle">

<div class="ms-3">

<h4 class="mb-1">
{{ user.name }}
</h4>

<p class="text-muted mb-0">
{{ user.email }}
</p>

</div>

</div>

</div>

<div class="container py-5">

    <div class="dashboard-card">

        <h1>🏦 Bank Customer Churn Prediction System</h1>

        <p>
            Welcome to the Machine Learning Dashboard.
        </p>

        <div class="row mt-5">

        <div class="col-md-3">

        <div class="info-card">

        <h5>Total Predictions</h5>

        <h1>{{ total }}</h1>

        </div>

        </div>

        <div class="col-md-3">

        <div class="info-card">

        <h5>High Risk</h5>

        <h1 style="color:red;">{{ high }}</h1>

        </div>

        </div>

        <div class="col-md-3">

        <div class="info-card">

        <h5>Medium Risk</h5>

        <h1 style="color:orange;">{{ medium }}</h1>

        </div>

        </div>

        <div class="col-md-3">

        <div class="info-card">

        <h5>Low Risk</h5>

        <h1 style="color:green;">{{ low }}</h1>

        </div>

        </div>

        </div>

        <div class="row mt-5">

        <div class="col-md-8 mx-auto">

        <canvas id="riskChart"></canvas>

        </div>

        </div>

        <div class="text-center mt-5">

            <a href="/prediction" class="btn btn-primary btn-lg">

                Start Prediction

            </a>

            <a href="/history" class="btn btn-success btn-lg ms-3">

                Prediction History

            </a>

            <a href="/reports" class="btn btn-info">
                Reports
            </a>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 

    <script>

    const ctx = document.getElementById("riskChart");

    new Chart(ctx,{

    type:"pie",

    data:{

    labels:["High","Medium","Low"],

    datasets:[{

    data:[

    {{ high }},

    {{ medium }},

    {{ low }}

    ],

    backgroundColor:[

    "#dc3545",

    "#ffc107",

    "#198754"

    ]

    }]

    }

    });

    </script>

</body>

</html>
