<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Bank Customer Churn Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,500;8..60,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>

        :root{
            --ink-950:#0a0e16;
            --ink-900:#111826;
            --ink-800:#182233;
            --line:rgba(212,167,58,.16);
            --gold:#d4a73a;
            --gold-soft:#e8c877;
            --signal:#49c6b8;
            --text-hi:#eae7df;
            --text-mid:#9aa3b2;
            --text-low:#5b6577;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            gap:18px;
            background:
                radial-gradient(ellipse 900px 500px at 50% -10%, rgba(212,167,58,.08), transparent 60%),
                repeating-linear-gradient(180deg, rgba(255,255,255,.02) 0px, rgba(255,255,255,.02) 1px, transparent 1px, transparent 28px),
                var(--ink-950);
            font-family:'Inter',sans-serif;
            padding:24px;
        }

        /* ---- terminal strip above card ---- */
        .terminal-strip{
            width:430px;
            max-width:100%;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
            font-family:'IBM Plex Mono',monospace;
            font-size:11.5px;
            letter-spacing:.05em;
            color:var(--text-low);
            padding:0 4px;
        }

        .terminal-strip .status{
            display:flex;
            align-items:center;
            gap:7px;
            color:var(--text-mid);
        }

        .status .dot{
            width:6px;
            height:6px;
            border-radius:50%;
            background:var(--signal);
            box-shadow:0 0 0 3px rgba(73,198,184,.15);
            animation:blink 2.4s ease-in-out infinite;
        }

        @keyframes blink{
            0%,100%{opacity:1;}
            50%{opacity:.35;}
        }

        .sparkline{
            width:96px;
            height:20px;
            overflow:visible;
        }

        .sparkline path{
            fill:none;
            stroke:var(--gold);
            stroke-width:1.4;
            stroke-linecap:round;
            stroke-linejoin:round;
            stroke-dasharray:220;
            stroke-dashoffset:220;
            animation:draw 2.6s ease-out infinite;
        }

        @keyframes draw{
            0%{stroke-dashoffset:220;}
            60%{stroke-dashoffset:0;}
            100%{stroke-dashoffset:0;opacity:1;}
        }

        /* ---- card ---- */
        .login-card{
            width:430px;
            max-width:100%;
            background:linear-gradient(180deg, var(--ink-900), var(--ink-800));
            border:1px solid var(--line);
            border-top:2px solid var(--gold);
            border-radius:14px;
            padding:46px 40px 36px;
            text-align:center;
            box-shadow:
                0 30px 60px -20px rgba(0,0,0,.6),
                0 0 0 1px rgba(255,255,255,.02) inset;
        }

        .mark{
            width:56px;
            height:56px;
            margin:0 auto 26px;
            border-radius:12px;
            background:var(--ink-950);
            border:1px solid var(--line);
            display:flex;
            align-items:flex-end;
            justify-content:center;
            gap:4px;
            padding:14px 12px 10px;
        }

        .mark span{
            width:5px;
            border-radius:2px;
            background:var(--gold);
            animation:pulse 1.8s ease-in-out infinite;
        }
        .mark span:nth-child(1){height:8px; animation-delay:0s;}
        .mark span:nth-child(2){height:16px; animation-delay:.2s; background:var(--gold-soft);}
        .mark span:nth-child(3){height:10px; animation-delay:.4s;}
        .mark span:nth-child(4){height:20px; animation-delay:.6s; background:var(--signal);}

        @keyframes pulse{
            0%,100%{transform:scaleY(1); opacity:.75;}
            50%{transform:scaleY(1.35); opacity:1;}
        }

        .eyebrow{
            font-family:'IBM Plex Mono',monospace;
            font-size:11px;
            letter-spacing:.18em;
            text-transform:uppercase;
            color:var(--signal);
            margin-bottom:14px;
        }

        h2{
            font-family:'Source Serif 4',serif;
            font-weight:600;
            font-size:26px;
            line-height:1.3;
            color:var(--text-hi);
        }

        h2 .accent{
            color:var(--gold-soft);
            font-style:italic;
        }

        .subtitle{
            color:var(--text-mid);
            font-size:14px;
            margin-top:12px;
            margin-bottom:34px;
            line-height:1.5;
        }

        .google-btn{
            width:100%;
            border-radius:9px;
            padding:13px;
            font-size:15px;
            font-weight:500;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            background:var(--ink-950);
            border:1px solid rgba(255,255,255,.12);
            color:var(--text-hi);
            transition:border-color .2s ease, background .2s ease, transform .15s ease;
        }

        .google-btn i{
            font-size:16px;
            color:var(--text-mid);
            transition:color .2s ease;
        }

        .google-btn:hover{
            border-color:var(--gold);
            background:var(--ink-800);
            color:var(--text-hi);
        }

        .google-btn:hover i{
            color:var(--gold-soft);
        }

        .google-btn:active{
            transform:scale(.99);
        }

        .google-btn:focus-visible{
            outline:2px solid var(--gold);
            outline-offset:2px;
        }

        .footer{
            margin-top:32px;
            padding-top:20px;
            border-top:1px solid var(--line);
        }

        .footer small{
            font-family:'IBM Plex Mono',monospace;
            font-size:11px;
            letter-spacing:.04em;
            color:var(--text-low);
        }

        @media (prefers-reduced-motion: reduce){
            .status .dot,
            .sparkline path,
            .mark span{
                animation:none;
            }
        }

        @media (max-width:480px){
            .login-card{padding:38px 26px 30px;}
            .terminal-strip{padding:0 2px;}
        }

    </style>
</head>
<body>

<div class="terminal-strip">
    <div class="status">
        <span class="dot"></span>
        MODEL v2.4 · LIVE
    </div>
    <svg class="sparkline" viewBox="0 0 96 20">
        <path d="M0,14 L14,15 L26,8 L38,11 L50,4 L62,9 L74,3 L86,7 L96,2"/>
    </svg>
</div>

<div class="login-card">
    <div class="mark" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
    </div>

    <div class="eyebrow">Retention Intelligence</div>

    <h2>
        Bank Customer<br>
        <span class="accent">Churn</span> Prediction
    </h2>

    <p class="subtitle">
        Machine-learning based customer retention system
    </p>

    <a href="/login" class="text-decoration-none">
        <button class="btn google-btn">
            <i class="fab fa-google"></i>
            Continue with Google
        </button>
    </a>

    <div class="footer">
        <small>© 2026 Bank Customer Churn Prediction System</small>
    </div>
</div>

</body>
</html>
