<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Bank Customer Churn Prediction</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:linear-gradient(135deg,#0d47a1,#1976d2,#42a5f5);

            font-family:Arial,Helvetica,sans-serif;

        }

        .login-card{

            width:430px;

            background:white;

            border-radius:20px;

            padding:45px;

            text-align:center;

            box-shadow:0 15px 35px rgba(0,0,0,.25);

        }

        .bank-icon{

            width:90px;

            height:90px;

            background:#0d6efd;

            color:white;

            border-radius:50%;

            display:flex;

            justify-content:center;

            align-items:center;

            margin:auto;

            font-size:40px;

            margin-bottom:20px;

        }

        h2{

            color:#0d47a1;

            font-weight:bold;

        }

        .subtitle{

            color:#666;

            margin-top:10px;

            margin-bottom:35px;

        }

        .google-btn{

            width:100%;

            border-radius:50px;

            padding:14px;

            font-size:18px;

            font-weight:bold;

        }

        .footer{

            margin-top:35px;

            font-size:14px;

            color:#888;

        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="bank-icon">

        <i class="fa-solid fa-building-columns"></i>

    </div>

    <h2>

        Bank Customer<br>

        Churn Prediction

    </h2>

    <p class="subtitle">

        Machine Learning Based Customer Retention System

    </p>

    <a href="/login" class="text-decoration-none">

        <button class="btn btn-danger google-btn">

            <i class="fab fa-google"></i>

            Continue with Google

        </button>

    </a>

    <div class="footer">

        <hr>

        <p>

            Predict customer churn using Machine Learning.<br>

            Flask • Python • LightGBM • SQLite

        </p>

        <small>

            © 2026 Bank Customer Churn Prediction System

        </small>

    </div>

</div>

</body>

</html>
